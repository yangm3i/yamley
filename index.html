<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yamley</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    .landing {
      width: 100vw;
      height: 100vh;
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 48px;
    }

    .landing-bg {
      position: absolute;
      inset: 0;
      background: url('images/IMG_8126.jpeg') center center / cover no-repeat;
    }

    .landing-label {
      position: relative;
      z-index: 1;
      background: rgba(250, 249, 247, 0.72);
      backdrop-filter: blur(2px);
      padding: 28px 48px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      transition: background 0.3s, transform 0.2s;
    }

    .landing-label:hover {
      background: rgba(250, 249, 247, 0.88);
      transform: scale(1.02);
    }

    .landing-label span {
      font-family: 'Georgia', serif;
      font-size: clamp(22px, 3.5vw, 48px);
      font-weight: 400;
      color: #1A1A1A;
      letter-spacing: 0.02em;
      display: block;
    }
  </style>
</head>
<body>

<div class="landing" onclick="window.location='home.html'">
  <div class="landing-bg"></div>
  <a class="landing-label" href="home.html">
    <span>welcome! click to enter ₍^. ̫ .^₎⟆</span>
  </a>
</div>

</body>
</html>
